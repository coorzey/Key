name: Update Daily Key

on:
  schedule:
    # Berjalan otomatis setiap hari pada jam 00:00 UTC (Jam 7 Pagi WIB)
    - cron: '0 0 * * *'
  workflow_dispatch: # Memungkinkan kamu menjalankan manual kapan saja di tab Actions

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Memberikan izin agar GitHub Bot bisa menulis/mengedit file di repo kamu
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate New Key
        run: python generate_key.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Key
          git commit -m "Update key harian otomatis" || echo "Tidak ada perubahan untuk di-commit"
          git push
